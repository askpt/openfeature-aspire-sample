[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = ["-v", "--tb=short"]

[tool.mypy]
python_version = "3.14"
strict = false
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true

[tool.black]
line-length = 100
target-version = ["py314"]
