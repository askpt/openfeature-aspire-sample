name: CI Build

on:
  push:
    branches:
      - "main"
    paths:
      - "src/**"
      - "**/*.props"
      - "*.slnx"
      - "global.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "**/*.props"
      - "*.slnx"
      - "global.json"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            dotnet:
              - 'src/Garage.ApiService/**'
              - 'src/Garage.ApiDatabaseSeeder/**'
              - 'src/Garage.ApiModel/**'
              - 'src/Garage.AppHost/**'
              - 'src/Garage.ServiceDefaults/**'
              - 'src/Garage.Shared/**'
              - '**/*.props'
              - '*.slnx'
              - 'global.json'
              - '.github/workflows/ci.yml'
            go:
              - 'src/Garage.FeatureFlags/**'
              - '.github/workflows/ci.yml'
            python:
              - 'src/Garage.ChatService/**'
              - '.github/workflows/ci.yml'
            web:
              - 'src/Garage.Web/**'
              - '.github/workflows/ci.yml'

  build-dotnet:
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Setup .NET Core
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
      - name: Restore dependencies
        run: dotnet restore
      - name: dotnet format
        run: dotnet format --verify-no-changes --no-restore
      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore
    #   - name: Test with dotnet
    #     run: dotnet test

  build-go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/Garage.FeatureFlags
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: src/Garage.FeatureFlags/go.mod
          cache-dependency-path: src/Garage.FeatureFlags/go.sum
      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Run 'go fmt ./...' to fix."
            gofmt -d .
            exit 1
          fi
      # setup-go with cache-dependency-path already restores the Go module cache.
      # go test compiles all packages (including those with no test files) before running,
      # so a separate `go build` step would double the compilation time.
      - name: Test
        run: go test -v ./...

  build-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/Garage.ChatService
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
          allow-prereleases: true
      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            src/Garage.ChatService/pyproject.toml
            src/Garage.ChatService/uv.lock
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run tests
        run: uv run pytest

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/Garage.Web
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/Garage.Web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
